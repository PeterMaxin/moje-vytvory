<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Moja galéria obrázkov</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 20px;
        }

        .item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            width: 420px;
        }

        .item img {
            width: 100%;
            height: 300px;        /* rovnaká výška */
            object-fit: contain;  /* nedeformuje obrázok */
            background: #eee;     /* pozadie ak je obrázok menší */
            border-radius: 10px;
        }

        .caption {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        /* jemný efekt pri hover */
        .item:hover {
            transform: scale(1.03);
            transition: 0.2s;
        }
    </style>
</head>
<body>

<h1>Moje kresby</h1>

<div class="gallery">

    <div class="item">
        <img src="babockapavooka.png" alt="Babočka pávooká">
        <div class="caption">Babočka pávooká</div>
    </div>

    <div class="item">
        <img src="vidlochvostpng.png" alt="Vidlochvost ovocný">
        <div class="caption">Vidlochvost ovocný</div>
    </div>

</div>

</body>
</html>
