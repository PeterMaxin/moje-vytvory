<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Moja galéria obrázkov</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            margin-top: 20px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .item img {
            width: 250px;
            border-radius: 10px;
        }
        .caption {
            margin-top: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Moje kresby</h1>

<div class="gallery">
    <div class="item">
        <img src="babocka.png" alt="Babočka pávooká">
        <div class="caption">Babočka pávooká</div>
    </div>

    <div class="item">
        <img src="vidlochvost.png" alt="Vidlochvost ovocný">
        <div class="caption">Vidlochvost ovocný</div>
    </div>
</div>

</body>
</html>
